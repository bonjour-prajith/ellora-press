name: Quality Checks

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce image size budget
        run: npm run audit:images:strict

      - name: Run quality checks
        run: npm run check
